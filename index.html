<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Brasileirão</title>
    <style>
        body { background: #0f1115; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 400px; background: #1a1d24; padding: 20px; border-radius: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #00c853; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

<div id="tela-login" class="container">
    <h2>Brasileirão</h2>
    <input type="tel" id="input-telefone" placeholder="Telefone (ex: 24993148000)">
    <input type="text" id="input-nome" placeholder="Seu nome (apenas para novo acesso)" class="hidden">
    <button id="btn-entrar" onclick="tentarEntrar()">ENTRAR</button>
</div>

<div id="tela-principal" class="container" style="display:none;">
    <h2>Bem-vindo, <span id="nome-usuario"></span>!</h2>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA2AOf9zLnPhiIwARN6nm0UPvt4uvBMw6s",
        authDomain: "bolao-de-rodadas.firebaseapp.com",
        databaseURL: "https://bolao-de-rodadas-default-rtdb.firebaseio.com/",
        projectId: "bolao-de-rodadas",
        storageBucket: "bolao-de-rodadas.firebasestorage.app",
        messagingSenderId: "990193977287",
        appId: "1:990193977287:web:36cf955446744b428dfbe2"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function tentarEntrar() {
        const tel = document.getElementById('input-telefone').value.trim();
        if(!tel) { alert("Digite o telefone!"); return; }
        
        console.log("Consultando banco para:", tel);
        
        db.ref('usuarios/' + tel).once('value')
            .then(snapshot => {
                if (snapshot.exists()) {
                    document.getElementById('tela-login').style.display = 'none';
                    document.getElementById('tela-principal').style.display = 'block';
                    document.getElementById('nome-usuario').innerText = snapshot.val().nome;
                } else {
                    alert("Número não encontrado. Se for seu primeiro acesso, verifique se o número está na lista de autorizados.");
                }
            })
            .catch(err => {
                alert("Erro ao conectar ao Firebase: " + err.message);
                console.error(err);
            });
    }
</script>
</body>
</html>
