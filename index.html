<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Alavancagem - Copa</title>
    <style>
        :root {
            --bg-principal: #121214;
            --bg-card: #1a1a1e;
            --cor-borda: #29292e;
            --laranja-bet: #f25a22;
            --verde-sucesso: #00b37e;
            --vermelho-erro: #f75a68;
            --texto-claro: #e1e1e6;
            --texto-escuro: #8d8d99;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-claro);
            padding: 15px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--cor-borda);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.2rem;
            color: var(--laranja-bet);
            text-transform: uppercase;
        }

        .toggle-config {
            background-color: #29292e;
            color: var(--texto-claro);
            border: 1px solid var(--laranja-bet);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .toggle-config.ativo {
            background-color: var(--laranja-bet);
            color: white;
        }

        .config-banca {
            background-color: var(--bg-card);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid var(--cor-borda);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
        }

        .input-group label {
            font-size: 0.85rem;
            color: var(--texto-escuro);
            text-transform: uppercase;
        }

        .input-group input {
            background-color: var(--bg-principal);
            border: 1px solid var(--cor-borda);
            color: var(--texto-claro);
            padding: 10px;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .painel-valores {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--cor-borda);
        }

        .bloco-valor span {
            display: block;
            font-size: 0.8rem;
            color: var(--texto-escuro);
        }

        .bloco-valor strong {
            font-size: 1.2rem;
        }

        .dia-secao {
            margin-bottom: 20px;
        }

        .dia-titulo {
            font-size: 1rem;
            color: var(--laranja-bet);
            margin-bottom: 10px;
            padding-left: 5px;
            border-left: 3px solid var(--laranja-bet);
        }

        .lista-jogos {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card-jogo {
            background-color: var(--bg-card);
            border-radius: 8px;
            padding: 12px;
            border: 1px solid var(--cor-borda);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card-jogo.status-ganhou { border-color: var(--verde-sucesso); }
        .card-jogo.status-perdeu { border-color: var(--vermelho-erro); }

        .confronto {
            font-size: 0.95rem;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        .botoes-odds {
            display: flex;
            gap: 10px;
        }

        .btn-odd {
            flex: 1;
            background-color: var(--bg-principal);
            border: 1px solid var(--cor-borda);
            color: var(--texto-claro);
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            text-align: center;
            transition: all 0.2s;
        }

        .btn-odd span {
            display: block;
            font-size: 1rem;
            font-weight: bold;
            color: var(--laranja-bet);
            margin-top: 2px;
        }

        .btn-odd.selecionado {
            border-color: var(--laranja-bet);
            background-color: rgba(242, 90, 34, 0.1);
        }

        .input-edit-odd {
            width: 100%;
            background-color: var(--bg-principal);
            border: 1px solid var(--laranja-bet);
            color: white;
            padding: 6px;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
            font-size: 1rem;
            margin-top: 4px;
        }

        .rodape-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 5px;
            padding-top: 8px;
            border-top: 1px dashed var(--cor-borda);
            font-size: 0.8rem;
            color: var(--texto-escuro);
        }

        .rodape-card strong { color: var(--texto-claro); }

        .botoes-resultado {
            display: flex;
            gap: 5px;
        }

        .btn-res {
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            opacity: 0.3;
        }

        .btn-res.verde { background-color: var(--verde-sucesso); }
        .btn-res.vermelho { background-color: var(--vermelho-erro); }
        
        .btn-res.ativo { opacity: 1; }
    </style>
</head>
<body>

    <header>

        <div class="painel-valores">

            <div class="bloco-valor" style="text-align: right;">
                <span>Jogos na Linha</span>
                <strong id="qtd-ativos">0</strong>

        </div>
    </div>
